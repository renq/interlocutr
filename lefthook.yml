assert_lefthook_installed: true

pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.go"
      run: go fmt ./...
    lint:
      glob: "*.go"
      run: golangci-lint run
    swag:
      glob: "*/http/*.go"
      run: make swagger
    test:
      run: make test
      root: .

lints:
  parallel: true
  commands:
    fmt:
      run: go fmt ./...
      root: .
    lint:
      run: golangci-lint run
      root: .
    swag:
      glob: "*/http/*.go"
      run: make swagger
    test:
      run: make test
      root: .
